<!DOCTYPE html>
<html lang="en">

<head>
    <link href="/assets/static/tailwind.css" rel="stylesheet" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/htmx.org@2.0.3"
        integrity="sha384-0895/pl2MU10Hqc6jd4RvrthNlDiE9U1tWmX7WRESftEDRosgxNsQG/Ze9YMRzHq"
        crossorigin="anonymous"></script>
    <title>browse</title>
</head>

<body>
    <div class="flex">
        <div id="left_sidebar_info" class="w-1/6 min-h-screen bg-main">
            <div id="input_search" class="flex">
                <form action="/browse" method="get" class="inline-flex mt-4">
                    <input type="text" name="query" class="w-full mr-1 ml-auto border-gray-300 rounded-3xl text-base">

                    <div id="input_settings_content" class="float-right">
                        <label for="input_settings_sort"></label>
                        <select id="input_settings_sort" name="sort">
                            <option value="imported">imported</option>
                            <option value="created">created</option>
                            <option value="modified">modified</option>
                        </select>
                    </div>
                </form>
            </div>



            <div id="tag_list"
                class="mr-4 w-full border border-hidden border-gray-300 rounded-3xl rounded-s-none text-base bg-third">
                <ul>
                    <div
                        class="ml-0 border border-l-fourth border-l-8 rounded-s-none border-r-transparent w-3/6 mx-auto">
                        {{ range .tagList}}
                        <li>{{ .Text }} {{ .Count }}</li>
                        {{ end }}
                    </div>
                </ul>
            </div>
        </div>

        <div id="center_gallery" class="w-5/6 min-h-screen h-full bg-second">
            <div id="rows_gallery" class="flex grid-cols-3 gap-4 flex-wrap items-center justify-center px-4 py-4">
                {{ range .entries}}
                <a href="/post/entry/{{.}}">
                    <img src="/thumbnail/{{.}}" class="h-auto w-60 min-w-60 rounded-lg" />
                </a>
                </object> {{ end }}
            </div>
        </div>
    </div>
</body>
